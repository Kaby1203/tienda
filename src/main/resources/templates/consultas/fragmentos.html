<!-- Fragmento #1 -->

<section th:fragment="tabs" class="py-3 mb-3">
    <div class="d-flex justify-content-center px-3">
        <ul class="nav nav-underline">
            <li class="nav-item">
                <a class="nav-link" aria-current="page" th:href="@{/}">
                    [[#{pruebas.todas}]]
                </a>
            </li>
            <li th:each="c : ${categorias}" class="nav-item">
                <a class="nav-link" th:href="@{/consultas/(id=${c.idCategoria})}">
                    [[${c.descripcion}]]
                </a>
            </li>
        </ul>
    </div>
</section>

<!-- Fragmento #2 -->

<section th:fragment="tarjetas" class="container py-4">
    <div class="row row-cols-1 row-cols-2 row-cols-lg-3 row-cols-xl-4 g-4">
        <div th:each="p : ${productos}" class="col">
            <div class="card h-100 shadow-sm">
                <div class="d-flex justify-content-center align-items-center bg-light p-3" style="height: 200px;">
                    <img th:src="${p.rutaImagen}" class="img-fluid" th:alt="${p.descripcion}" style="max-height: 100%; object-fit: contain;"/>
                </div>
                <div class="card-header bg-white">
                    <h5 class="card-title text-center text-truncate">
                        [[${p.descripcion}]]
                    </h5>
                </div>
                <div class="card-body d-flex flex-column">
                    <p class="card-text text-muted mb-auto text-truncate">[[${p.detalle}]]</p>
                </div>
                <div class="card-footer bg-white d-flex justify-content-between align-items-center">
                    <div class="fw-bold">
                        <span class="text-success h5">[[${#numbers.formatCurrency(p.precio)}]]</span>
                        <span th:if="${p.existencias > 0}" class="badge text-bg-success ms-2">[[${p.existencias}]] unidades</span>
                        <span th:if="${p.existencias < 1}" class="badge text-bg-danger">Agotado</span>
                    </div>
                    <form action="/carrito/agregar" th:method="post" class="d-inline">
                        <input type="hidden" th:value="${p.idProducto}" name="idProducto"/>
                        <button type="button" 
                                class="btn btn-sm btn-primary" 
                                th:disabled="${p.existencias == 0}" 
                                onclick="addCart(this.form)">
                            <i class="fas fa-cart-plus"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>


<!-- Fragmento #3  -->

<section th:fragment="consultas" class="row row-cols-4 p-2">
    <div th:replace="~{consultas/fragmentos :: formConsulta('primary', #{consultas.derivadas}, '/consultas/derivadas')}"></div>
    <div th:replace="~{consultas/fragmentos :: formConsulta('warning', #{consultas.jpql}, '/consultas/jpql')}"></div>
    <div th:replace="~{consultas/fragmentos :: formConsulta('success', #{consultas.sql}, '/consultas/sql')}"></div>
    <div th:replace="~{consultas/fragmentos :: formConsultaNombre('dark', 'Práctica #2', '/consultas/consultaNombre')}"></div>
</section>

<!-- Fragmento #4  -->
<div th:fragment="formConsulta(colorForm, textoForm, urlForm)">
    <form method="post" th:action="@{${urlForm}}" class="was-validated">
        <div class="card p-2">
            <div class="card-header text-center text-white" th:classappend="${'bg-' + colorForm}">
                <h5>[[${textoForm}]]</h5>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label>[[#{consultas.precio.inferior}]]</label>
                    <input type="number" name="precioInf" th:value="${precioInf}" class="form-control" min="0" required/>
                </div>
                <div class="mb-3">
                    <label>[[#{consultas.precio.superior}]]</label>
                    <input type="number" name="precioSup" th:value="${precioSup}" class="form-control" min="0" required/>
                </div>
            </div>
            <div class="card-footer text-center">
                <button type="submit" class="btn text-white" th:classappend="${'btn-' + colorForm}">
                    <i class="fas fa-solid fa-magnifying-glass"></i> [[${textoForm}]]
                </button>
            </div>
        </div>
    </form>
</div>

<!-- Fragmento #5 - ConsultaNombre para Práctica #2 -->
<div th:fragment="formConsultaNombre(colorForm, textoForm, urlForm)">
    <form method="post" th:action="@{${urlForm}}" class="was-validated">
        <div class="card p-2">
            <div class="card-header text-center text-white" th:classappend="${'bg-' + colorForm}">
                <h5>[[${textoForm}]]</h5>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label>Nombre del Producto</label>
                    <input type="text" name="nombre" th:value="${nombre}" class="form-control" placeholder="Ej: Xiaomi 14" required/>
                </div>
            </div>
            <div class="card-footer text-center">
                <button type="submit" class="btn text-white" th:classappend="${'btn-' + colorForm}">
                    <i class="fas fa-solid fa-magnifying-glass"></i> Consultar Nombre
                </button>
            </div>
        </div>
    </form>
</div>
